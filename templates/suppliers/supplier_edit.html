{% extends 'base.html' %}
{% block title %}Edit {{ supplier.supplier_name }}{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title"><i class="fas fa-pen-to-square"></i> Edit Supplier</h1>
        <div class="breadcrumb-custom">
            <a href="{% url 'dashboard:index' %}">Home</a>
            <i class="fas fa-chevron-right" style="font-size: 0.6rem;"></i>
            <a href="{% url 'suppliers:supplier_list' %}">Suppliers</a>
            <i class="fas fa-chevron-right" style="font-size: 0.6rem;"></i>
            <span>Edit</span>
        </div>
    </div>
    <a href="{% url 'suppliers:supplier_list' %}" class="btn-outline-custom"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card animate-scale-in">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Supplier Name</label>
                    {{ form.supplier_name }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    {{ form.email }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    {{ form.phone }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    {{ form.address }}
                </div>
                <button type="submit" class="btn-primary-custom"><i class="fas fa-save"></i> Update Supplier</button>
                <a href="{% url 'suppliers:supplier_list' %}" class="btn-outline-custom ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
