{% extends 'base.html' %}
{% block title %}Delete {{ supplier.supplier_name }}{% endblock %}
{% block content %}
<div class="delete-card animate-scale-in">
    <i class="fas fa-triangle-exclamation"></i>
    <h4>Delete Supplier</h4>
    <p>Are you sure you want to delete <strong style="color: #fff;">"{{ supplier.supplier_name }}"</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger-custom me-2"><i class="fas fa-trash"></i> Yes, Delete</button>
        <a href="{% url 'suppliers:supplier_list' %}" class="btn-outline-custom">Cancel</a>
    </form>
</div>
{% endblock %}
