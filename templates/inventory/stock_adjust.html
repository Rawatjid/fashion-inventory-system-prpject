{% extends 'base.html' %}
{% block title %}Adjust Stock{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title"><i class="fas fa-arrow-right-arrow-left"></i> Adjust Stock</h1>
        <div class="breadcrumb-custom">
            <a href="{% url 'dashboard:index' %}">Home</a>
            <i class="fas fa-chevron-right" style="font-size: 0.6rem;"></i>
            <a href="{% url 'inventory:inventory_list' %}">Inventory</a>
            <i class="fas fa-chevron-right" style="font-size: 0.6rem;"></i>
            <span>Adjust Stock</span>
        </div>
    </div>
    <a href="{% url 'inventory:inventory_list' %}" class="btn-outline-custom"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card animate-scale-in">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Product</label>
                    {{ form.product }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Change Type</label>
                    {{ form.change_type }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    {{ form.quantity }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    {{ form.notes }}
                </div>
                <button type="submit" class="btn-success-custom"><i class="fas fa-check"></i> Update Stock</button>
                <a href="{% url 'inventory:inventory_list' %}" class="btn-outline-custom ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
