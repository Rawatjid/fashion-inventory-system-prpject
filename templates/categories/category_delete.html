{% extends 'base.html' %}
{% block title %}Delete {{ category.category_name }}{% endblock %}
{% block content %}
<div class="delete-card animate-scale-in">
    <i class="fas fa-triangle-exclamation"></i>
    <h4>Delete Category</h4>
    <p>Are you sure you want to delete <strong style="color: #fff;">"{{ category.category_name }}"</strong>? Products in
        this category will be unassigned.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger-custom me-2"><i class="fas fa-trash"></i> Yes, Delete</button>
        <a href="{% url 'categories:category_list' %}" class="btn-outline-custom">Cancel</a>
    </form>
</div>
{% endblock %}
